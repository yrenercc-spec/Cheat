name: Build libYrener

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Clone ImGui
        run: git clone --depth=1 https://github.com/ocornut/imgui.git imgui

      - name: Clone shadowhook
        run: |
          git clone --depth=1 https://github.com/bytedance/android-inline-hook.git shadowhook_src
          cd shadowhook_src/shadowhook
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          find . -name "*.a" -exec cp {} ../../../ \;
          cp ../include/shadowhook.h ../../../

      - name: Build libYrener.so
        run: |
          CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++
          $CXX \
            -shared -fPIC -O2 -std=c++17 \
            -o libYrener.so \
            main.cpp \
            imgui/imgui.cpp \
            imgui/imgui_draw.cpp \
            imgui/imgui_tables.cpp \
            imgui/imgui_widgets.cpp \
            imgui/backends/imgui_impl_android.cpp \
            imgui/backends/imgui_impl_opengl3.cpp \
            -I . \
            -I imgui \
            -I imgui/backends \
            -L . -lshadowhook \
            -llog -landroid -lEGL -lGLESv3

      - name: Upload libYrener.so
        uses: actions/upload-artifact@v4
        with:
          name: libYrener
          path: libYrener.so
