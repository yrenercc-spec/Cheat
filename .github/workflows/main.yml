name: Build libYrener

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Unzip sources
        run: unzip yrener_soft.zip -d src

      - name: Build
        run: |
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -O2 -std=c++17 \
            -o libYrener.so \
            src/main.cpp \
            -I src \
            -llog -landroid -lEGL -lGLESv3

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libYrener
          path: libYrener.so
